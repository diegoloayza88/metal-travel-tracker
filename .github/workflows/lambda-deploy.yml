name: CI/CD — Metal Travel Tracker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION:     us-east-1
  PYTHON_VERSION: "3.13"
  TF_VERSION:     "1.14.0"
  TF_WORKING_DIR: ./terraform

jobs:

  lint-and-test:
    name: 🧪 Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio moto[dynamodb,s3,sns,ses] boto3

      - name: Lint con Ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Ejecutar tests
        run: pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION:    ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     testing
          AWS_SECRET_ACCESS_KEY: testing

  terraform-validate:
    name: 🔍 Terraform Validate
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Build Lambda packages
        run: |
          mkdir -p .build
          pip install -r requirements.txt -t .build/layer_tmp/python/
          cd .build/layer_tmp && zip -r ../layer.zip . && cd ../..
          cd src && zip -r ../.build/orchestrator.zip . && cd ..
          for name in flight_agent hotel_agent reporter_agent whatsapp_parser; do
            cp .build/orchestrator.zip .build/${name}.zip
          done

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Con TFC el plan corre en sus servidores, usando las variables
      # de entorno configuradas en el workspace (AWS_ACCESS_KEY_ID, etc.)
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        id: plan
        run: terraform plan -no-color -input=false 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Comentar Plan en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const maxLength = 65000;
            const truncated = plan.length > maxLength
              ? plan.substring(0, maxLength) + '\n... (truncado)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [lint-and-test, terraform-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build packages
        run: |
          mkdir -p .build
          pip install -r requirements.txt -t .build/layer_tmp/python/
          cd .build/layer_tmp && zip -r ../layer.zip . && cd ../..
          cd src && zip -r ../.build/orchestrator.zip . && cd ..
          for name in flight_agent hotel_agent reporter_agent whatsapp_parser; do
            cp .build/orchestrator.zip .build/${name}.zip
          done

      - name: Upload packages a S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          BUCKET="metal-travel-tracker-prod-lambda-code"
          aws s3 cp .build/layer.zip          s3://${BUCKET}/layer.zip
          aws s3 cp .build/orchestrator.zip   s3://${BUCKET}/orchestrator.zip
          aws s3 cp .build/flight_agent.zip   s3://${BUCKET}/flight_agent.zip
          aws s3 cp .build/hotel_agent.zip    s3://${BUCKET}/hotel_agent.zip
          aws s3 cp .build/reporter_agent.zip s3://${BUCKET}/reporter_agent.zip
          aws s3 cp .build/whatsapp_parser.zip s3://${BUCKET}/whatsapp_parser.zip

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Apply corre en TFC. Las credenciales AWS viven en el workspace de TFC,
      # no en los secrets de GitHub. GitHub Actions solo orquesta.
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false

      - name: Notificar deploy a Discord
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Deploy exitoso",
                "description": "Metal Travel Tracker actualizado correctamente.",
                "color": 65280,
                "footer": {"text": "GitHub Actions • Metal Travel Tracker"}
              }]
            }'